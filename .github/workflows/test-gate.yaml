name: Test Gate

# Test Gate: PR from build/{ref} or task/{ref} -> uat
# Validates the inbound commit chain (specification-commit, test-commit,
# build-commit) for build/{ref} PRs, or a single commit for task/{ref} PRs.
# Also validates that all tests pass with adequate code coverage.
# Human approval (required reviewers) and human override (admin bypass of a
# failing required check) are configured in branch protection, not here.

on:
  pull_request:
    branches:
      - 'uat'

concurrency:
  group: test-gate-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  statuses: write

jobs:
  validate-test-gate:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout PR head (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Derive {ref} and verify branch
        id: ref
        run: |
          HEAD_REF="${{ github.head_ref }}"
          BASE_REF="${{ github.event.pull_request.base.ref }}"
          ERRORS=""

          if [ "$BASE_REF" != "uat" ]; then
            ERRORS="${ERRORS}The base branch must be \`uat\`"$'\n'
          fi

          if printf '%s' "$HEAD_REF" | grep -Eq '^build/[A-Z]+-[0-9]+$'; then
            REF="${HEAD_REF#build/}"
            BRANCH_TYPE="build"
          elif printf '%s' "$HEAD_REF" | grep -Eq '^task/[A-Z]+-[0-9]+$'; then
            REF="${HEAD_REF#task/}"
            BRANCH_TYPE="task"
          else
            ERRORS="${ERRORS}The branch of the PR must match \`build/{ref}\` or \`task/{ref}\`, e.g. 'build/MAG-30' or 'task/MAG-30'"$'\n'
            REF=""
          fi

          if [ -n "$ERRORS" ]; then
            printf '%s' "$ERRORS" > .test-gate-error
            printf '%s' "$ERRORS" | while IFS= read -r line; do echo "::error::$line"; done
            exit 1
          fi

          echo "ref=$REF" >> "$GITHUB_OUTPUT"
          echo "branch_type=$BRANCH_TYPE" >> "$GITHUB_OUTPUT"
          echo "Derived ref: $REF, branch type: $BRANCH_TYPE"

      - name: Validate PR title contains {ref}
        env:
          REF: ${{ steps.ref.outputs.ref }}
          TITLE: ${{ github.event.pull_request.title }}
        run: |
          if ! printf '%s' "$TITLE" | grep -qE "$REF"; then
            echo "The title of the PR must contain \`{ref}\`, e.g. 'MAG-30'" > .test-gate-error
            echo "::error::PR title \"$TITLE\" does not contain ref \"$REF\""
            exit 1
          fi

      - name: Identify inbound commits
        id: commits
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          BRANCH_TYPE="${{ steps.ref.outputs.branch_type }}"
          REF="${{ steps.ref.outputs.ref }}"
          ERRORS=""

          COMMITS=$(git rev-list --reverse "$BASE_SHA".."$HEAD_SHA")
          COUNT=$(printf '%s\n' "$COMMITS" | grep -c . || true)
          echo "Commit count: $COUNT"

          if [ "$BRANCH_TYPE" = "build" ]; then
            if [ "$COUNT" -lt 3 ]; then
              ERRORS="${ERRORS}PRs from build/{ref} to uat must contain 3 commits."$'\n'
            fi
            if [ "$COUNT" -gt 3 ]; then
              ERRORS="${ERRORS}PRs from build/{ref} to uat must contain 3 commits."$'\n'
            fi
          elif [ "$BRANCH_TYPE" = "task" ]; then
            if [ "$COUNT" -ne 1 ]; then
              ERRORS="${ERRORS}PRs from task/{ref} to uat must contain 1 commit."$'\n'
            fi
          fi

          if [ -n "$ERRORS" ]; then
            printf '%s' "$ERRORS" > .test-gate-error
            printf '%s' "$ERRORS" | while IFS= read -r line; do echo "::error::$line"; done
            exit 1
          fi

          if [ "$BRANCH_TYPE" = "build" ]; then
            SPEC_SHA=$(printf '%s\n' "$COMMITS" | sed -n '1p')
            TEST_SHA=$(printf '%s\n' "$COMMITS" | sed -n '2p')
            BUILD_SHA=$(printf '%s\n' "$COMMITS" | sed -n '3p')
            echo "spec_sha=$SPEC_SHA" >> "$GITHUB_OUTPUT"
            echo "test_sha=$TEST_SHA" >> "$GITHUB_OUTPUT"
            echo "build_sha=$BUILD_SHA" >> "$GITHUB_OUTPUT"
            echo "Spec: $SPEC_SHA, Test: $TEST_SHA, Build: $BUILD_SHA"
          else
            TASK_SHA=$(printf '%s\n' "$COMMITS" | sed -n '1p')
            echo "task_sha=$TASK_SHA" >> "$GITHUB_OUTPUT"
            echo "Task commit: $TASK_SHA"
          fi

      - name: Validate specification commit (build/{ref} path)
        if: steps.ref.outputs.branch_type == 'build'
        env:
          REF: ${{ steps.ref.outputs.ref }}
          SPEC_SHA: ${{ steps.commits.outputs.spec_sha }}
        run: |
          ERRORS=""

          MSG=$(git log -1 --format=%s "$SPEC_SHA")
          echo "Specification commit message: $MSG"

          if ! printf '%s' "$MSG" | grep -Eq "^$REF"; then
            ERRORS="${ERRORS}The specification commit must start with \`{ref}\`, e.g. MAG-30"$'\n'
          fi

          DESC=$(printf '%s' "$MSG" | sed -E "s/^$REF[[:space:]:]*//")
          if [ -z "$DESC" ]; then
            ERRORS="${ERRORS}The specification commit must describe the change"$'\n'
          fi

          CHANGED=$(git diff-tree --no-commit-id --name-only -r "$SPEC_SHA")
          echo "Changed files:"; echo "$CHANGED"

          BAD=$(printf '%s\n' "$CHANGED" | grep -v "^docs/tasks/task-$REF/" || true)
          if [ -n "$BAD" ]; then
            ERRORS="${ERRORS}The specification commit may only change /docs/tasks/task-{ref}"$'\n'
          fi

          if [ ! -f "docs/tasks/task-$REF/task-$REF.md" ]; then
            ERRORS="${ERRORS}The specification commit must define the task"$'\n'
          fi

          SPEC_FILES=$(git ls-tree --name-only "$SPEC_SHA" "docs/tasks/task-$REF/" 2>/dev/null | grep -cE "task-$REF(-[0-9]+)?(-[a-z]+)?-spec\.md$" || true)
          if [ "$SPEC_FILES" -eq 0 ]; then
            ERRORS="${ERRORS}The specification commit must include the task spec"$'\n'
          fi

          if [ -n "$ERRORS" ]; then
            printf '%s' "$ERRORS" > .test-gate-error
            printf '%s' "$ERRORS" | while IFS= read -r line; do echo "::error::$line"; done
            exit 1
          fi

          echo "✅ Specification commit valid"

      - name: Validate test commit (build/{ref} path)
        if: steps.ref.outputs.branch_type == 'build'
        env:
          REF: ${{ steps.ref.outputs.ref }}
          SPEC_SHA: ${{ steps.commits.outputs.spec_sha }}
          TEST_SHA: ${{ steps.commits.outputs.test_sha }}
        run: |
          ERRORS=""

          MSG=$(git log -1 --format=%s "$TEST_SHA")
          echo "Test commit message: $MSG"

          if ! printf '%s' "$MSG" | grep -Eq "^$REF"; then
            ERRORS="${ERRORS}The test commit must start with \`{ref}\`, e.g. MAG-30"$'\n'
          fi

          DESC=$(printf '%s' "$MSG" | sed -E "s/^$REF[[:space:]:]*//")
          if [ -z "$DESC" ]; then
            ERRORS="${ERRORS}The test commit must describe the change"$'\n'
          fi

          CHANGED=$(git diff-tree --no-commit-id --name-only -r "$TEST_SHA")
          echo "Changed files:"; echo "$CHANGED"

          BAD=$(printf '%s\n' "$CHANGED" | grep -v "^test/" || true)
          if [ -n "$BAD" ]; then
            ERRORS="${ERRORS}The test commit may only change /test"$'\n'
          fi

          ADDED=$(git diff --diff-filter=A --name-only "$SPEC_SHA" "$TEST_SHA" -- test)
          MODIFIED=$(git diff --diff-filter=M --name-only "$SPEC_SHA" "$TEST_SHA" -- test)
          DELETED=$(git diff --diff-filter=D --name-only "$SPEC_SHA" "$TEST_SHA" -- test)

          if [ -n "$MODIFIED" ]; then
            ERRORS="${ERRORS}The test commit may not change existing tests"$'\n'
          fi

          if [ -n "$DELETED" ]; then
            ERRORS="${ERRORS}The test commit may not change existing tests"$'\n'
          fi

          if [ -z "$ADDED" ]; then
            ERRORS="${ERRORS}The test commit must define a new test"$'\n'
          fi

          if [ -n "$ERRORS" ]; then
            printf '%s' "$ERRORS" > .test-gate-error
            printf '%s' "$ERRORS" | while IFS= read -r line; do echo "::error::$line"; done
            exit 1
          fi

          echo "Added test files:"; echo "$ADDED"
          echo "✅ Test commit valid"

      - name: Validate build commit (build/{ref} path)
        if: steps.ref.outputs.branch_type == 'build'
        env:
          REF: ${{ steps.ref.outputs.ref }}
          BUILD_SHA: ${{ steps.commits.outputs.build_sha }}
        run: |
          ERRORS=""

          MSG=$(git log -1 --format=%s "$BUILD_SHA")
          echo "Build commit message: $MSG"

          if ! printf '%s' "$MSG" | grep -Eq "^$REF"; then
            ERRORS="${ERRORS}The build commit must start with \`{ref}\`, e.g. MAG-30"$'\n'
          fi

          DESC=$(printf '%s' "$MSG" | sed -E "s/^$REF[[:space:]:]*//")
          if [ -z "$DESC" ]; then
            ERRORS="${ERRORS}The build commit must describe the change"$'\n'
          fi

          CHANGED=$(git diff-tree --no-commit-id --name-only -r "$BUILD_SHA")
          echo "Changed files:"; echo "$CHANGED"

          BAD=$(printf '%s\n' "$CHANGED" | grep -v "^src/" || true)
          if [ -n "$BAD" ]; then
            ERRORS="${ERRORS}The build commit may only change /src"$'\n'
          fi

          if [ -n "$ERRORS" ]; then
            printf '%s' "$ERRORS" > .test-gate-error
            printf '%s' "$ERRORS" | while IFS= read -r line; do echo "::error::$line"; done
            exit 1
          fi

          echo "✅ Build commit valid"

      - name: Validate task commit (task/{ref} path)
        if: steps.ref.outputs.branch_type == 'task'
        env:
          REF: ${{ steps.ref.outputs.ref }}
          TASK_SHA: ${{ steps.commits.outputs.task_sha }}
        run: |
          ERRORS=""

          MSG=$(git log -1 --format=%s "$TASK_SHA")
          echo "Task commit message: $MSG"

          if ! printf '%s' "$MSG" | grep -Eq "^$REF"; then
            ERRORS="${ERRORS}The task commit must start with \`{ref}\`, e.g. MAG-30"$'\n'
          fi

          DESC=$(printf '%s' "$MSG" | sed -E "s/^$REF[[:space:]:]*//")
          if [ -z "$DESC" ]; then
            ERRORS="${ERRORS}The task commit must describe the change"$'\n'
          fi

          if [ -n "$ERRORS" ]; then
            printf '%s' "$ERRORS" > .test-gate-error
            printf '%s' "$ERRORS" | while IFS= read -r line; do echo "::error::$line"; done
            exit 1
          fi

          echo "✅ Task commit valid"

      - name: Install dependencies
        run: echo "pnpm install --frozen-lockfile"

      - name: Run tests and check coverage thresholds
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          ERRORS=""

          # Run full test suite with coverage collection
          set +e
          echo "pnpm test -- --coverage"
          TEST_RESULT=0
          set -e

          if [ "$TEST_RESULT" -ne 0 ]; then
            ERRORS="${ERRORS}All tests must pass"$'\n'
          fi

          # Check overall code coverage (>= 85%)
          if [ -f "coverage/coverage-summary.json" ]; then
            OVERALL=$(node -e "const c = require('./coverage/coverage-summary.json'); console.log(c.total.lines.pct)")
            echo "Overall coverage: $OVERALL%"
            if (( $(echo "$OVERALL < 85" | bc -l) )); then
              ERRORS="${ERRORS}Code coverage must be at least 85% (got $OVERALL%)"$'\n'
            fi
          fi

          # Check diff coverage (>= 95% of lines changed by the PR)
          if [ -f "coverage/lcov.info" ]; then
            DIFF_COVERAGE=$(node -e "
              const fs = require('fs');
              const cp = require('child_process');

              const baseRef = process.env.BASE_REF || 'uat';
              const mergeBase = cp.execSync('git merge-base origin/' + baseRef + ' HEAD').toString().trim();

              const lcov = fs.readFileSync('coverage/lcov.info', 'utf8');
              const coverage = {};
              let currentFile = '';
              lcov.split('\n').forEach(function(l) {
                if (l.startsWith('SF:')) { currentFile = l.substring(3); coverage[currentFile] = {}; }
                else if (l.startsWith('DA:') && currentFile) {
                  var p = l.substring(3).split(',');
                  coverage[currentFile][parseInt(p[0])] = parseInt(p[1]) > 0;
                }
              });

              var diff = cp.execSync('git diff ' + mergeBase + '..HEAD --diff-filter=AM').toString();
              var changedLines = [];
              var curFile = '';
              var curLine = 0;
              diff.split('\n').forEach(function(l) {
                if (l.startsWith('+++ b/')) { curFile = l.substring(6); }
                else if (l.startsWith('@@')) {
                  var m = l.match(/\+([0-9]+)(?:,([0-9]+))?/);
                  if (m) curLine = parseInt(m[1]);
                } else if (l.startsWith('+') && curFile) {
                  changedLines.push({ file: curFile, line: curLine }); curLine++;
                } else if (l.startsWith(' ') && curFile) { curLine++; }
              });

              var covered = 0, uncovered = 0;
              changedLines.forEach(function(cl) {
                if (coverage[cl.file] && coverage[cl.file][cl.line] !== undefined) {
                  if (coverage[cl.file][cl.line]) covered++; else uncovered++;
                } else { uncovered++; }
              });
              var total = covered + uncovered;
              console.log(total > 0 ? (covered / total * 100).toFixed(2) : 100);
            " 2>/dev/null || echo "100")
            echo "Diff coverage: $DIFF_COVERAGE%"
            if (( $(echo "$DIFF_COVERAGE < 95" | bc -l) )); then
              ERRORS="${ERRORS}New or changed code coverage must be at least 95% (got $DIFF_COVERAGE%)"$'\n'
            fi
          fi

          if [ -n "$ERRORS" ]; then
            printf '%s' "$ERRORS" > .test-gate-error
            printf '%s' "$ERRORS" | while IFS= read -r line; do echo "::error::$line"; done
            exit 1
          fi

          echo "✅ All tests pass and coverage thresholds met"

      - name: TestGate failure
        if: failure()
        run: |
          gh api "/repos/${{ github.repository }}/statuses/${{ github.event.pull_request.head.sha }}" \
            -f state=failure -f context=TestGate \
            -f description="TestGate validation failed"
          if [ -f .test-gate-error ]; then
            gh api "/repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments" \
              -f body="$(cat .test-gate-error)"
          fi

      - name: All TestGate validations pass
        if: success()
        run: |
          gh api "/repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments" \
            -f body="All TestGate validations pass"
          gh api "/repos/${{ github.repository }}/statuses/${{ github.event.pull_request.head.sha }}" \
            -f state=success -f context=TestGate \
            -f description="All TestGate validations pass"
          echo "✅ All TestGate validations pass"
